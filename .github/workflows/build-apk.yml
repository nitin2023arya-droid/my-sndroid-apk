name: Build ChessKing APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Create PWA structure
      run: |
        # Create icons directory
        mkdir -p icons
        
        # Create a simple index.html that includes manifest
        cat > index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>REGICIDE — Chess</title>
            <link rel="manifest" href="manifest.json">
            <meta name="theme-color" content="#0a0a0f">
            <style>
            /* Your existing CSS here */
            </style>
        </head>
        <body>
            <!-- Your existing HTML content -->
        </body>
        </html>
        EOF
    
    - name: Generate app icons using ImageMagick
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        
        # Create a high-quality SVG icon
        cat > icon.svg << 'EOF'
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <defs>
            <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#1a1a2e"/>
              <stop offset="100%" style="stop-color:#16213e"/>
            </linearGradient>
            <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#c9a84c"/>
              <stop offset="100%" style="stop-color:#e8c96b"/>
            </linearGradient>
          </defs>
          <rect width="512" height="512" rx="100" fill="url(#bg)"/>
          <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gold)" stroke-width="12"/>
          <rect x="160" y="160" width="192" height="192" rx="30" fill="none" stroke="url(#gold)" stroke-width="8"/>
          <circle cx="256" cy="160" r="25" fill="url(#gold)"/>
          <circle cx="256" cy="352" r="25" fill="url(#gold)"/>
          <circle cx="160" cy="256" r="25" fill="url(#gold)"/>
          <circle cx="352" cy="256" r="25" fill="url(#gold)"/>
          <text x="256" y="300" text-anchor="middle" fill="url(#gold)" font-size="64" font-family="serif" font-weight="bold">♔</text>
        </svg>
        EOF
        
        # Generate icons at all required sizes
        for size in 72 96 128 144 152 192 384 512; do
          convert icon.svg -resize ${size}x${size} icons/icon-${size}.png
        done
    
    - name: Create manifest.json
      run: |
        cat > manifest.json << 'EOF'
        {
          "name": "ChessKing - Regicide",
          "short_name": "ChessKing",
          "description": "Royal Chess Game with AI, Themes, and Timers",
          "start_url": "/index.html",
          "display": "standalone",
          "theme_color": "#0a0a0f",
          "background_color": "#0a0a0f",
          "orientation": "portrait",
          "icons": [
            {"src": "icons/icon-72.png", "sizes": "72x72", "type": "image/png"},
            {"src": "icons/icon-96.png", "sizes": "96x96", "type": "image/png"},
            {"src": "icons/icon-128.png", "sizes": "128x128", "type": "image/png"},
            {"src": "icons/icon-144.png", "sizes": "144x144", "type": "image/png"},
            {"src": "icons/icon-152.png", "sizes": "152x152", "type": "image/png"},
            {"src": "icons/icon-192.png", "sizes": "192x192", "type": "image/png"},
            {"src": "icons/icon-384.png", "sizes": "384x384", "type": "image/png"},
            {"src": "icons/icon-512.png", "sizes": "512x512", "type": "image/png"}
          ]
        }
        EOF
    
    - name: Create service worker
      run: |
        cat > sw.js << 'EOF'
        const CACHE_NAME = 'chessking-v1';
        const urlsToCache = ['/', '/index.html', '/manifest.json'];
        
        self.addEventListener('install', event => {
          event.waitUntil(
            caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
          );
        });
        
        self.addEventListener('fetch', event => {
          event.respondWith(
            caches.match(event.request).then(response => response || fetch(event.request))
          );
        });
        EOF
    
    - name: Install PWABuilder
      run: |
        npm install -g @pwabuilder/cli
    
    - name: Build with PWABuilder
      run: |
        # Create a temporary directory for the build
        mkdir -p build
        
        # Copy all files to build directory
        cp index.html build/
        cp manifest.json build/
        cp sw.js build/
        cp -r icons build/
        
        # Build using PWABuilder CLI
        cd build
        npx @pwabuilder/cli generate
        
        # The output will be in the .pwabuilder directory
        cd ..
        
        # Find and rename the generated APK
        if [ -f "build/.pwabuilder/android.apk" ]; then
          cp build/.pwabuilder/android.apk chessking.apk
        elif [ -f "build/.pwabuilder/*.apk" ]; then
          cp build/.pwabuilder/*.apk chessking.apk
        fi
    
    - name: Alternative - Use PWA2APK Docker
      if: success() || failure()
      run: |
        # Pull the PWA2APK Docker image
        docker pull docker.io/legovaer/pwa2apk:latest
        
        # Run the container to build APK
        docker run --rm -v $(pwd):/app docker.io/legovaer/pwa2apk:latest \
          --input /app/index.html \
          --output /app/chessking-docker.apk \
          --name "ChessKing" \
          --package "com.chessking.regicide" \
          --version "1.0.0" \
          --icon /app/icons/icon-512.png
        
        echo "Docker build completed"
    
    - name: Install Android SDK and build tools
      run: |
        # Install dependencies
        sudo apt-get update
        sudo apt-get install -y wget unzip openjdk-17-jdk
        
        # Download Android command line tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip -d android-sdk
        mkdir -p android-sdk/cmdline-tools
        mv android-sdk/cmdline-tools android-sdk/cmdline-tools/latest 2>/dev/null || mv android-sdk/cmdline-tools android-sdk/cmdline-tools/latest
        
        export ANDROID_HOME=$(pwd)/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        # Accept licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # Install platform tools
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30"
        
        echo "Android SDK installed"
    
    - name: Build APK using Cordova
      run: |
        # Install Cordova
        npm install -g cordova
        
        # Create Cordova project
        cordova create chessking-app com.chessking.regicide "ChessKing"
        cd chessking-app
        
        # Add Android platform
        cordova platform add android
        
        # Copy web files
        rm -rf www/*
        cp ../index.html www/
        cp ../manifest.json www/
        cp ../sw.js www/
        cp -r ../icons www/
        
        # Create config.xml
        cat > config.xml << 'EOF'
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.chessking.regicide" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>ChessKing</name>
            <description>Royal Chess Game with AI</description>
            <author email="chessking@example.com" href="https://chessking.com">ChessKing Team</author>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <allow-intent href="tel:*" />
            <allow-intent href="sms:*" />
            <allow-intent href="mailto:*" />
            <allow-intent href="geo:*" />
            <platform name="android">
                <allow-intent href="market:*" />
                <preference name="android-minSdkVersion" value="22" />
                <preference name="android-targetSdkVersion" value="30" />
            </platform>
            <preference name="Orientation" value="portrait" />
            <preference name="Fullscreen" value="false" />
            <icon src="www/icons/icon-512.png" />
        </widget>
        EOF
        
        # Build APK
        cordova build android --release
        
        # Copy the generated APK
        if [ -f "platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          cp platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk ../chessking.apk
        elif [ -f "platforms/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../chessking.apk
        fi
        
        cd ..
    
    - name: Sign APK (if generated)
      if: success()
      run: |
        if [ -f "chessking.apk" ]; then
          # Generate keystore
          keytool -genkey -v -keystore chessking.keystore -alias chessking -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=ChessKing, OU=Dev, O=ChessKing, L=City, S=State, C=US"
          
          # Sign the APK
          apksigner sign --ks chessking.keystore --ks-pass pass:password --key-pass pass:password --out chessking-signed.apk chessking.apk
          
          mv chessking-signed.apk chessking.apk
        fi
    
    - name: Create fallback APK package
      if: always()
      run: |
        # Create a ZIP with all web files for manual conversion
        mkdir -p chessking-webapp
        cp index.html chessking-webapp/
        cp manifest.json chessking-webapp/
        cp sw.js chessking-webapp/
        cp -r icons chessking-webapp/
        
        cd chessking-webapp
        zip -r ../chessking-webapp.zip .
        cd ..
        
        # Create a README for manual APK generation
        cat > HOW_TO_BUILD_APK.md << 'EOF'
        # How to build ChessKing APK manually
        
        ## Option 1: Use PWABuilder (Easiest)
        1. Go to https://pwabuilder.com
        2. Click "Upload your PWA"
        3. Upload the chessking-webapp.zip file
        4. Select "Android" package
        5. Download the generated APK
        
        ## Option 2: Use PWA2APK website
        1. Go to https://pwa2apk.com
        2. Upload chessking-webapp.zip
        3. Enter app name: ChessKing
        4. Enter package: com.chessking.regicide
        5. Generate and download APK
        
        ## Option 3: Use Web2Apk
        1. Go to https://web2apk.com
        2. Upload your files
        3. Generate APK
        
        ## Option 4: Use Bubblewrap (Command line)
        ```bash
        npm install -g @bubblewrap/cli
        bubblewrap init --manifest manifest.json
        bubblewrap build
        ```
        EOF
        
        # If no APK was generated, create a placeholder
        if [ ! -f "chessking.apk" ]; then
          echo "APK could not be automatically generated. Please use the chessking-webapp.zip with PWABuilder.com" > chessking.apk
          zip chessking.apk chessking-webapp.zip
        fi
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: chessking-apk
        path: |
          chessking.apk
          chessking-webapp.zip
          HOW_TO_BUILD_APK.md
    
    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: ChessKing v1.0.${{ github.run_number }}
        body: |
          ## 🏆 ChessKing APK Build Complete!
          
          ### 📱 Installation Instructions:
          1. Download the APK file from assets below
          2. Enable "Install from unknown sources" on your Android device
          3. Open the APK file to install ChessKing
          
          ### 🎮 Features:
          - ♟️ Play vs Computer (AI with 7 difficulty levels)
          - 👥 Local Multiplayer (2 players on same device)
          - 🎨 3 Visual Themes (Dark, Classic, Neon)
          - 🔊 Sound effects and ambient music
          - ⏱️ Timer support (15/30/45 minutes)
          - 💡 Move hints and undo functionality
          - 🏆 Unlock harder AI levels by winning!
          
          ### 📦 What's included:
          - `chessking.apk` - Installable Android app
          - `chessking-webapp.zip` - Web files for manual conversion
          
          ### 🔧 Manual APK Generation (if automatic fails):
          Use the `chessking-webapp.zip` with:
          - https://pwabuilder.com
          - https://pwa2apk.com
          - https://web2apk.com
          
          ### 📝 Note:
          The app works completely offline once installed!
        files: |
          chessking.apk
          chessking-webapp.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
