<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REGICIDE — Chess</title>
<style>
/* Google Fonts removed for APK compatibility — using system font stack */
@font-face {
  font-family: 'Cinzel';
  src: local('Georgia'), local('Times New Roman');
  font-weight: 400 900;
}
@font-face {
  font-family: 'Cinzel Decorative';
  src: local('Georgia'), local('Times New Roman');
  font-weight: 400 700;
}
@font-face {
  font-family: 'Crimson Pro';
  src: local('Georgia'), local('Times New Roman');
  font-weight: 300 400;
  font-style: normal italic;
}

:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3e;
  --gold: #c9a84c;
  --gold-light: #e8c96b;
  --gold-dark: #8a6f2e;
  --cream: #f0e6cc;
  --text: #d4c4a0;
  --text-dim: #7a6d55;
  --white-sq: #e8d5b0;
  --black-sq: #6b4e3d;
  --highlight: rgba(201,168,76,0.45);
  --move-dot: rgba(201,168,76,0.6);
  --check-red: rgba(220,50,50,0.55);
  --last-move: rgba(100,180,100,0.3);
  --white-adv: #e8e8e8;
  --black-adv: #1a1a1a;
  --accent: #7b5ea7;
}
.theme-classic {
  /* Background Layers - Warm Light */
  --bg: #f5efe6;
  --surface: #fdf8f2;
  --surface2: #ede4d6;

  /* Borders */
  --border: #c9b89a;

  /* Gold Accent */
  --gold: #8b5e1a;
  --gold-light: #b07828;
  --gold-dark: #5a3a0a;

  /* Text Colors */
  --cream: #2c1a08;
  --text: #3d2b10;
  --text-dim: #8a6d4a;

  /* Chess Board Squares - Classic Ivory & Walnut */
  --white-sq: #f0d9b5;
  --black-sq: #b58863;

  /* Move & Selection Effects */
  --highlight: rgba(139,94,26,0.35);
  --move-dot: rgba(139,94,26,0.55);
  --check-red: rgba(200,40,40,0.4);
  --last-move: rgba(80,160,80,0.3);

  /* Player adv */
  --white-adv: #f0d9b5;
  --black-adv: #4a2a10;

  /* Accent */
  --accent: #7b5ea7;
}
.theme-neon {
  --bg: #020208;
  --surface: #050510;
  --surface2: #0a0a1f;
  --border: #1a1a4a;
  --gold: #00ffcc;
  --gold-light: #66ffee;
  --gold-dark: #00aa88;
  --cream: #ccffee;
  --text: #88ffdd;
  --text-dim: #336655;
  --white-sq: #1a2a3a;
  --black-sq: #050d15;
  --highlight: rgba(0,255,204,0.4);
  --move-dot: rgba(0,255,204,0.5);
  --last-move: rgba(0,255,100,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);

  color: var(--text);
  touch-action: none;
}

/* GRAIN OVERLAY */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.6;
}

/* SCREENS */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
  overflow: hidden;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }
.screen.slide-out { transform: translateX(-100%); opacity: 0; }
.screen.slide-in { transform: translateX(100%); opacity: 0; }

/* ═══════════════════════════════
   WELCOME SCREEN
═══════════════════════════════ */
#welcome-screen {
  background: var(--bg);
  gap: 0;
  overflow-y: auto;
  align-items: flex-start;
  justify-content: flex-start;
}

.welcome-bg {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
              radial-gradient(ellipse at 0% 100%, rgba(123,94,167,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.welcome-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image: 
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201,168,76,0.025) 60px, rgba(201,168,76,0.025) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.025) 60px, rgba(201,168,76,0.025) 61px);
}

.welcome-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center;
  width: 100%; max-width: 420px;
  padding: 24px 20px 40px;
  gap: 20px;
  margin: 0 auto;
}

.logo-area {
  text-align: center;
  animation: fadeDown 0.8s ease both;
}

.logo-crown {
  font-size: 42px; line-height: 1;
  margin-bottom: 4px;
  filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
  animation: pulse-glow 3s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 20px rgba(201,168,76,0.5)); }
  50% { filter: drop-shadow(0 0 35px rgba(201,168,76,0.8)); }
}

.logo-title {
  font-family: 'Cinzel Decorative', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: clamp(28px, 8vw, 38px);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-shadow: 0 0 40px rgba(201,168,76,0.4);
  line-height: 1;
}

.logo-sub {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.5em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 6px;
}

/* Ornament */
.ornament {
  display: flex; align-items: center; gap: 12px;
  width: 100%;
}
.ornament::before, .ornament::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
}
.ornament-diamond {
  width: 6px; height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
  box-shadow: 0 0 8px rgba(201,168,76,0.6);
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  width: 100%;
  animation: fadeUp 0.6s ease both;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
}

.card-label {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* Mode selector */
.mode-btns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.mode-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 8px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  color: var(--text-dim);
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 12px;
  letter-spacing: 0.1em;
}
.mode-btn .mode-icon { font-size: 24px; margin-bottom: 4px; }
.mode-btn.active, .mode-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,168,76,0.07);
  box-shadow: 0 0 20px rgba(201,168,76,0.1) inset;
}

/* Piece color selector */
.piece-selector {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.piece-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 12px;
  color: var(--text-dim);
}
.piece-btn .piece-icon { font-size: 28px; margin-bottom: 3px; }
.piece-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,168,76,0.07);
}
.piece-btn:disabled {
  opacity: 0.4; cursor: default;
}

/* Difficulty */
.diff-display {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.diff-name {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 14px;
  color: var(--gold);
  font-weight: 600;
}
.diff-stars {
  font-size: 10px; letter-spacing: 2px;
}

.slider-wrap {
  position: relative; padding: 8px 0;
}
.diff-slider {
  -webkit-appearance: none;
  width: 100%; height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  position: relative;
}
.diff-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
  box-shadow: 0 0 12px rgba(201,168,76,0.6);
  border: 2px solid var(--bg);
  transition: transform 0.15s, box-shadow 0.15s;
}
.diff-slider::-webkit-slider-thumb:active {
  transform: scale(1.2);
  box-shadow: 0 0 20px rgba(201,168,76,0.8);
}
.diff-slider::-webkit-slider-runnable-track {
  height: 3px; border-radius: 2px;
}

.diff-levels {
  display: flex; justify-content: space-between;
  margin-top: 8px;
}
.diff-pip {
  font-size: 7px; color: var(--text-dim);
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
  transition: color 0.2s;
  flex: 1; text-align: center;
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  letter-spacing: 0.05em;
}
.diff-pip.locked { opacity: 0.35; }
.diff-pip.active { color: var(--gold); }
.diff-pip .pip-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border);
  transition: background 0.2s, box-shadow 0.2s;
}
.diff-pip.active .pip-dot {
  background: var(--gold);
  box-shadow: 0 0 6px rgba(201,168,76,0.7);
}

/* Sound controls */
.sound-row {
  display: flex; gap: 10px;
}
.sound-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}
.sound-btn svg { width: 18px; height: 18px; transition: all 0.2s; }
.sound-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.sound-btn.active svg { filter: drop-shadow(0 0 4px var(--gold)); }

/* Theme row */
.theme-row {
  display: flex; gap: 8px;
}
.theme-btn {
  flex: 1;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 8px 4px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}
.theme-btn .theme-preview {
  width: 100%; height: 20px; border-radius: 4px; margin-bottom: 5px;
  display: grid; grid-template-columns: 1fr 1fr;
}
.theme-btn .theme-preview span {
  border-radius: 2px;
}
.theme-btn.active { border-color: var(--gold); color: var(--gold); }

/* START BUTTON */
.start-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
  background-size: 200% 200%;
  border: none;
  border-radius: 10px;
  padding: 16px;
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.3em;
  color: var(--bg);
  cursor: pointer;
  transition: all 0.3s;
  animation: shimmer 3s ease-in-out infinite, fadeUp 0.8s ease both 0.4s;
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
}
@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.4); }
.start-btn:active { transform: translateY(0); }

/* ═══════════════════════════════
   GAME SCREEN
═══════════════════════════════ */
#game-screen {
  background: var(--bg);
  padding: 0;
  justify-content: flex-start;
}

.game-layout {
  display: flex; flex-direction: column;
  width: 100%; height: 100%;
  align-items: center;
}

/* Header */
.game-header {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 8px; }
.header-right { display: flex; align-items: center; gap: 6px; }

.back-btn, .icon-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-dim);
  transition: all 0.2s; font-size: 16px;
}
.back-btn:hover, .icon-btn:hover, .icon-btn.active {
  border-color: var(--gold); color: var(--gold);
  background: rgba(201,168,76,0.06);
}

.game-title {
  font-family: 'Cinzel Decorative', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 14px; color: var(--gold);
  letter-spacing: 0.15em;
}

.turn-badge {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  transition: all 0.3s;
}
.turn-badge.white-turn { border-color: rgba(240,230,204,0.4); color: var(--cream); }
.turn-badge.black-turn { border-color: rgba(60,60,80,0.8); color: var(--text-dim); }

/* Player info */
.player-info {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px;
  flex-shrink: 0;
}
.player-card {
  display: flex; align-items: center; gap: 8px;
}
.player-avatar {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  border: 1.5px solid var(--border);
  transition: all 0.3s;
  background: var(--surface);
}
.player-avatar.active-player {
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(201,168,76,0.3);
}
.player-name {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 0.1em;
}
.captured-pieces { font-size: 10px; min-width: 50px; }

/* Board area — with eval bar */
.board-area {
  display: flex; align-items: center; justify-content: center;
  flex: 1; width: 100%;
  padding: 4px;
  gap: 6px;
  min-height: 0;
}

/* Eval bar */
.eval-bar-wrap {
  display: flex; flex-direction: column; align-items: center;
  height: 100%; max-height: calc(100vw - 24px);
  width: 22px; flex-shrink: 0;
  gap: 4px;
}
.eval-label {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 7px; color: var(--text-dim); letter-spacing: 0.1em;
  writing-mode: vertical-rl;
}
.eval-bar {
  flex: 1; width: 10px;
  border-radius: 5px;
  background: var(--black-adv);
  overflow: hidden;
  border: 1px solid var(--border);
  position: relative;
}
.eval-bar-fill {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--white-adv);
  transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
  border-radius: 0 0 4px 4px;
}
.eval-score {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 8px; color: var(--text-dim);
}

/* Chess board */
.board-container {
  position: relative;
  flex-shrink: 0;
}

.board-frame {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 6px;
  padding: 2px;
  position: relative;
  box-shadow: 0 10px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.1) inset;
}

.board-coords-row {
  display: flex; justify-content: space-around;
  padding: 0 0 2px 0;
}
.board-coords-col {
  display: flex; flex-direction: column; justify-content: space-around;
  padding: 0 2px 0 0;
  position: absolute; left: 2px; top: 14px;
  height: calc(100% - 28px);
}
.coord {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 9px; color: var(--text-dim);
  text-align: center; line-height: 1;
  opacity: 0.6;
}

#chessboard {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}

.square {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
}
.square.light { background: var(--white-sq); }
.square.dark  { background: var(--black-sq); }

.square.highlighted { background: var(--highlight) !important; }
.square.legal-move::after {
  content: '';
  position: absolute;
  width: 32%; height: 32%;
  border-radius: 50%;
  background: var(--move-dot);
  pointer-events: none;
  z-index: 3;
}
.square.legal-capture::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: inset 0 0 0 4px var(--move-dot);
  pointer-events: none;
  z-index: 3;
}
.square.in-check { background: var(--check-red) !important; }
.square.last-move { background: var(--last-move) !important; }

.piece {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  cursor: grab;
  user-select: none;
  pointer-events: none;
  line-height: 1;
}
.piece svg {
  width: 82%;
  height: 82%;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  transition: filter 0.15s;
}

.piece.dragging {
  cursor: grabbing;
  transform: scale(1.15);
  z-index: 100;
}
.piece.dragging svg {
  filter: drop-shadow(0 6px 18px rgba(0,0,0,0.85));
}
@keyframes pieceSlide {
  from { transform: translate(var(--slide-x), var(--slide-y)) scale(1.08); }
  to   { transform: translate(0, 0) scale(1); }
}
.piece.sliding {
  animation: pieceSlide 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}

/* Hint overlay */
.hint-overlay {
  position: absolute; inset: 0;
  border: 3px solid var(--gold);
  border-radius: 0;
  pointer-events: none;
  z-index: 5;
  animation: hint-pulse 1.2s ease-in-out infinite;
  display: none;
}
@keyframes hint-pulse {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 0.3; }
}

/* Bottom controls */
.game-controls {
  width: 100%;
  padding: 8px 12px;
  display: flex; gap: 8px;
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.ctrl-btn {
  flex: 1; padding: 10px 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-dim);
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 9px;
  letter-spacing: 0.1em;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: all 0.2s; text-transform: uppercase;
}
.ctrl-btn svg, .ctrl-btn .ctrl-icon { 
  width: 18px; height: 18px; font-size: 18px;
}
.ctrl-btn:hover, .ctrl-btn:active {
  border-color: var(--gold); color: var(--gold);
  background: rgba(201,168,76,0.05);
}
.ctrl-btn:disabled { opacity: 0.3; pointer-events: none; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(6px);
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  max-width: 320px; width: 90%;
  text-align: center;
  position: relative; overflow: hidden;
  transform: scale(0.9);
  transition: transform 0.3s;
}
.modal-overlay.active .modal { transform: scale(1); }
.modal::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.modal-crown { font-size: 52px; margin-bottom: 8px; }
.modal-title {
  font-family: 'Cinzel Decorative', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 22px; color: var(--gold);
  margin-bottom: 6px;
}
.modal-sub {
  font-size: 16px; color: var(--text-dim);
  font-style: italic; margin-bottom: 4px;
}
.modal-unlock {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif; font-size: 11px;
  color: var(--gold-light); letter-spacing: 0.15em;
  margin: 10px 0 16px;
  padding: 8px 12px;
  background: rgba(201,168,76,0.08);
  border-radius: 6px; border: 1px solid var(--gold-dark);
}
.modal-btns { display: flex; gap: 10px; }
.modal-btn {
  flex: 1; padding: 12px;
  border-radius: 8px;
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 12px; letter-spacing: 0.15em;
  cursor: pointer; transition: all 0.2s;
  border: 1px solid var(--border);
  color: var(--text-dim); background: var(--surface2);
}
.modal-btn.primary {
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--bg); border-color: var(--gold);
  font-weight: 600;
}
.modal-btn:hover { opacity: 0.85; }

/* Promotion modal */
.promo-pieces {
  display: flex; gap: 12px; justify-content: center;
  margin: 16px 0;
}
.promo-piece {
  font-size: 44px; cursor: pointer;
  transition: transform 0.2s;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
}
.promo-piece:hover { transform: scale(1.15); }

/* Move history panel */
.history-panel {
  width: 100%; padding: 0 12px 4px;
  flex-shrink: 0; max-height: 44px;
  overflow-x: auto; overflow-y: hidden;
}
.history-inner {
  display: flex; gap: 4px; align-items: center;
  padding: 2px 0;
  white-space: nowrap;
}
.history-move {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 9px; letter-spacing: 0.05em;
  color: var(--text-dim);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 6px;
  flex-shrink: 0;
}
.history-move.latest { border-color: var(--gold-dark); color: var(--gold); }
.history-move-num { color: var(--text-dim); font-size: 8px; }

/* TOAST */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 16px;
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif; font-size: 11px;
  color: var(--gold); letter-spacing: 0.15em;
  opacity: 0; transition: all 0.3s;
  z-index: 500; pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Animations */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.25s; }
.card:nth-child(4) { animation-delay: 0.3s; }

/* Check animation */
@keyframes checkFlash {
  0%, 100% { background: var(--check-red) !important; }
  50% { background: rgba(220,80,80,0.7) !important; }
}
.square.in-check { animation: checkFlash 0.6s ease infinite; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Timer ────────────────────────────────── */
.timer-card { display: none; }
.timer-opts {
  display: flex; gap: 8px;
}
.timer-opt {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 4px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}
.timer-opt.active, .timer-opt:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,168,76,0.07);
}
.timer-opt .timer-min { font-size: 17px; font-weight: 700; display: block; }

/* In-game timer display */
.player-timer {
  font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
  min-width: 60px;
  text-align: center;
  transition: all 0.3s;
}
.player-timer.active-timer {
  color: var(--gold);
  border-color: var(--gold-dark);
  background: rgba(201,168,76,0.06);
}
.player-timer.warning {
  color: #e05050 !important;
  border-color: rgba(220,80,80,0.5) !important;
  animation: timerWarning 1s ease-in-out infinite;
}
@keyframes timerWarning {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.player-timer.hidden-timer { display: none; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     WELCOME SCREEN
═══════════════════════════════════════ -->
<div class="screen" id="welcome-screen">
  <div class="welcome-bg"></div>
  <div class="welcome-content">
    
    <div class="logo-area">
      <div class="logo-crown"><svg viewBox="0 0 45 45" style="width:42px;height:42px;filter:drop-shadow(0 0 20px rgba(201,168,76,0.6))"><use href="#wK"/></svg></div>
      <div class="logo-title">REGICIDE</div>
      <div class="logo-sub">The Royal Game of Chess</div>
    </div>

    <div class="ornament"><div class="ornament-diamond"></div></div>

    <!-- Game Mode -->
    <div class="card">
      <div class="card-label">Game Mode</div>
      <div class="mode-btns">
        <button class="mode-btn active" id="btn-pvp" onclick="selectMode('pvp')">
          <div class="mode-icon">⚔️</div>
          <div>Vs Player</div>
        </button>
        <button class="mode-btn" id="btn-bot" onclick="selectMode('bot')">
          <div class="mode-icon">🤖</div>
          <div>Vs Computer</div>
        </button>
      </div>
    </div>

    <!-- Bot options (difficulty + color) -->
    <div class="card" id="bot-options" style="display:none">
      <div class="card-label">Play As</div>
      <div class="piece-selector" id="color-selector">
        <button class="piece-btn active" id="btn-white" onclick="selectColor('white')">
          <div class="piece-icon"><svg viewBox="0 0 45 45" style="width:28px;height:28px"><use href="#wK"/></svg></div>
          <div>White</div>
        </button>
        <button class="piece-btn" id="btn-black" onclick="selectColor('black')">
          <div class="piece-icon"><svg viewBox="0 0 45 45" style="width:28px;height:28px"><use href="#bK"/></svg></div>
          <div>Black</div>
        </button>
      </div>
    </div>

    <div class="card" id="diff-card" style="display:none">
      <div class="card-label">Difficulty</div>
      <div class="diff-display">
        <div class="diff-name" id="diff-name">Beginner</div>
        <div class="diff-stars" id="diff-stars">★☆☆☆☆☆☆</div>
      </div>
      <div class="slider-wrap">
        <input type="range" class="diff-slider" id="diff-slider" min="0" max="6" value="0" step="1">
      </div>
      <div class="diff-levels" id="diff-pips"></div>
      <div class="diff-locked-msg" id="diff-locked-msg"></div>
    </div>

    <!-- Timer (bot mode only) -->
    <div class="card timer-card" id="timer-card">
      <div class="card-label">Time Control</div>
      <div class="timer-opts">
        <button class="timer-opt active" id="timer-none" onclick="selectTimer(0)">
          <span class="timer-min">∞</span>Off
        </button>
        <button class="timer-opt" id="timer-15" onclick="selectTimer(15)">
          <span class="timer-min">15</span>min
        </button>
        <button class="timer-opt" id="timer-30" onclick="selectTimer(30)">
          <span class="timer-min">30</span>min
        </button>
        <button class="timer-opt" id="timer-45" onclick="selectTimer(45)">
          <span class="timer-min">45</span>min
        </button>
      </div>
    </div>

    <!-- Sound -->
    <div class="card">
      <div class="card-label">Audio</div>
      <div class="sound-row">
        <button class="sound-btn active" id="sfx-btn" onclick="toggleSfx()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          Sound FX
        </button>
        <button class="sound-btn active" id="music-btn" onclick="toggleMusic()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          Music
        </button>
      </div>
      <!-- Themes -->
      <div class="card-label" style="margin-top:12px">Theme</div>
      <div class="theme-row">
        <button class="theme-btn active" onclick="setTheme('dark')" id="theme-dark">
          <div class="theme-preview">
            <span style="background:#0a0a0f"></span><span style="background:#c9a84c"></span>
            <span style="background:#e8d5b0"></span><span style="background:#6b4e3d"></span>
          </div>
          Obsidian
        </button>
        <button class="theme-btn" onclick="setTheme('classic')" id="theme-classic">
          <div class="theme-preview">
            <span style="background:#f5efe6"></span><span style="background:#8b5e1a"></span>
            <span style="background:#f0d9b5"></span><span style="background:#b58863"></span>
          </div>
          Classic
        </button>
        <button class="theme-btn" onclick="setTheme('neon')" id="theme-neon">
          <div class="theme-preview">
            <span style="background:#020208"></span><span style="background:#00ffcc"></span>
            <span style="background:#1a2a3a"></span><span style="background:#050d15"></span>
          </div>
          Neon
        </button>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">BEGIN THE GAME</button>

  </div>
</div>

<!-- ═══════════════════════════════════════
     GAME SCREEN
═══════════════════════════════════════ -->
<div class="screen hidden" id="game-screen">
  <div class="game-layout">
    
    <!-- Header -->
    <div class="game-header">
      <div class="header-left">
        <button class="back-btn" onclick="goBack()" title="Menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
        </button>
        <div class="game-title">REGICIDE</div>
      </div>
      <div class="turn-badge" id="turn-badge">WHITE'S TURN</div>
      <div class="header-right">
        <button class="icon-btn" id="sound-toggle-btn" onclick="toggleGameSfx()" title="Sound">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Top player (Black) -->
    <div class="player-info" id="top-player-info">
      <div class="player-card">
        <div class="player-avatar" id="top-avatar">♚</div>
        <div>
          <div class="player-name" id="top-name">BLACK</div>
          <div class="captured-pieces" id="top-captured"></div>
        </div>
      </div>
      <div class="player-timer hidden-timer" id="top-timer">15:00</div>
    </div>

    <!-- Board + Eval Bar -->
    <div class="board-area">
      <div class="eval-bar-wrap">
        <div class="eval-label">W</div>
        <div class="eval-bar" id="eval-bar">
          <div class="eval-bar-fill" id="eval-fill" style="height:50%"></div>
        </div>
        <div class="eval-label">B</div>
        <div class="eval-score" id="eval-score">0</div>
      </div>

      <div class="board-container">
        <div class="board-frame">
          <div id="chessboard"></div>
        </div>
      </div>
    </div>

    <!-- Bottom player (White) -->
    <div class="player-info" id="bottom-player-info">
      <div class="player-card">
        <div class="player-avatar" id="bottom-avatar">♔</div>
        <div>
          <div class="player-name" id="bottom-name">WHITE</div>
          <div class="captured-pieces" id="bottom-captured"></div>
        </div>
      </div>
      <div class="player-timer hidden-timer" id="bottom-timer">15:00</div>
    </div>

    <!-- Move history -->
    <div class="history-panel">
      <div class="history-inner" id="history-inner"></div>
    </div>

    <!-- Controls -->
    <div class="game-controls">
      <button class="ctrl-btn" onclick="undoMove()" id="undo-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 10h10a8 8 0 0 1 0 16H3M3 10l4-4M3 10l4 4"/>
        </svg>
        Undo
      </button>
      <button class="ctrl-btn" onclick="showHint()" id="hint-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Hint
      </button>
      <button class="ctrl-btn" onclick="restartGame()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Restart
      </button>
    </div>

  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="end-modal">
  <div class="modal">
    <div class="modal-crown" id="modal-crown">♔</div>
    <div class="modal-title" id="modal-title">Checkmate!</div>
    <div class="modal-sub" id="modal-sub">White wins</div>
    <div class="modal-unlock" id="modal-unlock" style="display:none"></div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="goBack(); closeModal('end-modal')">Menu</button>
      <button class="modal-btn primary" onclick="restartGame(); closeModal('end-modal')">Play Again</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="promo-modal">
  <div class="modal">
    <div class="modal-title">Pawn Promotion</div>
    <div class="modal-sub">Choose your piece</div>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  AUDIO ENGINE (Web Audio API — fully offline)
// ══════════════════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, type='sine', dur=0.12, vol=0.3, delay=0) {
  if (!G.sfxOn) return;
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e){}
}

const SFX = {
  move: () => {
    playTone(440, 'triangle', 0.08, 0.25);
    playTone(660, 'triangle', 0.06, 0.12, 0.04);
  },
  capture: () => {
    playTone(220, 'sawtooth', 0.1, 0.3);
    playTone(180, 'sawtooth', 0.15, 0.2, 0.05);
  },
  check: () => {
    playTone(880, 'square', 0.06, 0.2);
    playTone(1100,'square', 0.06, 0.2, 0.08);
    playTone(880, 'square', 0.06, 0.2, 0.16);
  },
  win: () => {
    const notes = [523, 659, 784, 1047];
    notes.forEach((f,i) => playTone(f, 'triangle', 0.25, 0.4, i*0.12));
  },
  lose: () => {
    const notes = [392, 349, 330, 262];
    notes.forEach((f,i) => playTone(f, 'sawtooth', 0.3, 0.3, i*0.15));
  },
  unlock: () => {
    playTone(523,'triangle',0.1,0.3);
    playTone(659,'triangle',0.1,0.3,0.1);
    playTone(784,'triangle',0.15,0.35,0.2);
    playTone(1047,'triangle',0.2,0.4,0.32);
  },
  illegal: () => playTone(200, 'square', 0.05, 0.15)
};

// Ambient music via Web Audio
let musicNodes = null;
function startMusic() {
  if (!G.musicOn) return;
  stopMusic();
  try {
    const ctx = getAudio();
    musicNodes = [];
    // Drone pads
    const drone = [65.41, 98, 130.81]; // C2, G2, C3
    drone.forEach(f => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 400;
      osc.type = 'sine';
      osc.frequency.value = f;
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.frequency.value = 0.15; lfoGain.gain.value = 0.5;
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      gain.gain.value = 0.04;
      lfo.start(); osc.start();
      musicNodes.push(osc, lfo);
    });
  } catch(e){}
}
function stopMusic() {
  if (musicNodes) { musicNodes.forEach(n=>{ try{n.stop();}catch(e){} }); musicNodes=null; }
}

// ══════════════════════════════════════════════════════════
//  GLOBAL STATE
// ══════════════════════════════════════════════════════════
const DIFF_NAMES = ['Beginner','Intermediate','Hard','Extra Hard','Professional','Champion','GM Champion'];

let G = {
