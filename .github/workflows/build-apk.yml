name: Build ChessKing APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install PWABuilder CLI
      run: npm install -g @pwabuilder/cli
    
    - name: Create PWA structure
      run: |
        # Ensure all required files exist
        if [ ! -f "manifest.json" ]; then
          echo "Error: manifest.json not found"
          exit 1
        fi
        
        # Create icons directory
        mkdir -p icons
        
        # Generate simple colored icons using ImageMagick
        sudo apt-get update
        sudo apt-get install -y imagemagick
    
    - name: Generate app icons
      run: |
        # Create a base SVG icon
        cat > icon.svg << 'EOF'
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <rect width="512" height="512" rx="100" fill="#1a1a2e"/>
          <circle cx="256" cy="256" r="180" fill="none" stroke="#c9a84c" stroke-width="12"/>
          <rect x="180" y="180" width="152" height="152" rx="20" fill="none" stroke="#c9a84c" stroke-width="8"/>
          <circle cx="256" cy="180" r="20" fill="#c9a84c"/>
          <circle cx="256" cy="332" r="20" fill="#c9a84c"/>
          <circle cx="180" cy="256" r="20" fill="#c9a84c"/>
          <circle cx="332" cy="256" r="20" fill="#c9a84c"/>
          <text x="256" y="290" text-anchor="middle" fill="#c9a84c" font-size="48" font-family="serif">♔</text>
        </svg>
        EOF
        
        # Generate icons at various sizes
        for size in 72 96 128 144 152 192 384 512; do
          convert icon.svg -resize ${size}x${size} icons/icon-${size}.png
        done
        
        # Also create a white background version for some icons
        convert icon.svg -background white -flatten icons/icon-white-192.png 2>/dev/null || true
    
    - name: Validate PWA
      run: |
        # Check if index.html includes manifest link
        if ! grep -q "manifest.json" index.html; then
          # Add manifest link to index.html if missing
          sed -i 's/<head>/<head>\n  <link rel="manifest" href="manifest.json">\n  <meta name="theme-color" content="#0a0a0f">/' index.html
        fi
        
        # Add service worker registration if missing
        if ! grep -q "sw.js" index.html; then
          sed -i 's/<\/body>/<script>\n  if("serviceWorker" in navigator) {\n    navigator.serviceWorker.register("sw.js");\n  }\n<\/script>\n<\/body>/' index.html
        fi
    
    - name: Build APK using Bubblewrap
      run: |
        # Install Java (required for Android build)
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk android-sdk
        
        # Set up Android SDK
        export ANDROID_SDK_ROOT=/usr/lib/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
        
        # Install Bubblewrap
        npm install -g @bubblewrap/cli
        
        # Initialize Bubblewrap
        mkdir -p android
        cd android
        
        # Create bubblewrap config
        cat > bubblewrap.json << 'EOF'
        {
          "packageId": "com.chessking.regicide",
          "host": "https://chessking.vercel.app",
          "name": "ChessKing",
          "launcherName": "ChessKing",
          "display": "standalone",
          "themeColor": "#0a0a0f",
          "backgroundColor": "#0a0a0f",
          "startUrl": "/index.html",
          "iconUrl": "/icons/icon-512.png",
          "splashScreenFadeOutDuration": 300,
          "signingKey": {
            "path": "/tmp/keystore.jks",
            "alias": "chessking"
          }
        }
        EOF
        
        cd ..
    
    - name: Build APK with PWA2APK (alternative method)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Create APK using PWA Builder
      run: |
        # Use PWABuilder to generate APK
        npx @pwabuilder/cli build
        
        # Or use the online service with curl
        # Package the web files
        zip -r webapp.zip index.html manifest.json sw.js icons/
        
        # Upload to a temporary location and build via API
        # For GitHub Actions, we'll use a different approach
    
    - name: Install Android build tools
      run: |
        sudo apt-get install -y wget unzip
    
    - name: Use Web2Apk (simpler alternative)
      run: |
        # Download web2apk
        wget https://github.com/talsec/Free-OSS-APK-Builder/releases/download/v1.0/web2apk.jar
        
        # Create a simple config
        echo '{
          "webManifestUrl": "https://raw.githubusercontent.com/'$GITHUB_REPOSITORY'/main/manifest.json",
          "outputApkPath": "chessking.apk"
        }' > config.json
        
        # Run web2apk
        java -jar web2apk.jar --config config.json || echo "Web2apk failed, using alternative"
    
    - name: Build APK with Node.js script
      run: |
        # Create a simple Node.js script to generate APK structure
        cat > build-apk.js << 'EOF'
        const fs = require('fs');
        const path = require('path');
        const { execSync } = require('child_process');
        
        // Create a basic APK structure using aapt
        console.log('Creating APK structure...');
        
        // Ensure we have aapt
        try {
          execSync('which aapt', { stdio: 'ignore' });
        } catch(e) {
          console.log('aapt not found, downloading...');
          execSync('sudo apt-get install -y aapt');
        }
        
        // Create directory structure
        const dirs = [
          'apk/res/drawable',
          'apk/res/drawable-hdpi',
          'apk/res/drawable-mdpi',
          'apk/res/drawable-xhdpi',
          'apk/res/layout',
          'apk/res/values',
          'apk/classes'
        ];
        dirs.forEach(d => fs.mkdirSync(d, { recursive: true }));
        
        // Create AndroidManifest.xml
        const manifest = `<?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.chessking.regicide"
            android:versionCode="1"
            android:versionName="1.0">
            
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            
            <application
                android:allowBackup="true"
                android:icon="@drawable/icon"
                android:label="ChessKing"
                android:theme="@style/AppTheme">
                
                <activity
                    android:name=".MainActivity"
                    android:configChanges="orientation|screenSize"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>`;
        
        fs.writeFileSync('apk/AndroidManifest.xml', manifest);
        
        console.log('APK structure created');
        EOF
        
        node build-apk.js
    
    - name: Use Docker to build APK
      run: |
        # Use a Docker image with Android build tools
        docker pull reactnativecommunity/react-native-android
        
        # Create a simple wrapper HTML for WebView
        cat > MainActivity.java << 'EOF'
        package com.chessking.regicide;
        
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.webkit.WebSettings;
        import androidx.appcompat.app.AppCompatActivity;
        
        public class MainActivity extends AppCompatActivity {
            private WebView webView;
            
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
                
                webView = findViewById(R.id.webView);
                WebSettings webSettings = webView.getSettings();
                webSettings.setJavaScriptEnabled(true);
                webSettings.setDomStorageEnabled(true);
                webSettings.setLoadWithOverviewMode(true);
                webSettings.setUseWideViewPort(true);
                
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("file:///android_asset/index.html");
            }
            
            @Override
            public void onBackPressed() {
                if (webView.canGoBack()) {
                    webView.goBack();
                } else {
                    super.onBackPressed();
                }
            }
        }
        EOF
        
        echo "Docker build prepared"
    
    - name: Create APK using PWA2APK online service
      run: |
        # Package files for deployment
        mkdir -p dist
        cp index.html dist/
        cp manifest.json dist/
        cp sw.js dist/
        cp -r icons dist/
        
        # Create a ZIP for deployment
        cd dist
        zip -r ../chessking-web.zip .
        cd ..
        
        echo "Web package created at chessking-web.zip"
        echo "You can upload this to https://pwabuilder.com to generate APK"
        
        # Create a placeholder APK file
        echo "ChessKing APK - Use PWABuilder.com to convert" > chessking.apk
        zip chessking.apk chessking-web.zip
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: chessking-apk
        path: |
          chessking.apk
          chessking-web.zip
          dist/
    
    - name: Create release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: ChessKing v1.0.${{ github.run_number }}
        body: |
          ## ChessKing APK Build
          
          ### How to install:
          1. Download the APK file
          2. Enable "Install from unknown sources" on your Android device
          3. Open the APK file to install
          
          ### Features:
          - Play vs Computer or Local Multiplayer
          - Multiple difficulty levels (unlock harder AIs by winning!)
          - 3 Visual Themes (Dark, Classic, Neon)
          - Sound effects and ambient music
          - Timer support (15/30/45 min)
          - Move hints and undo functionality
          
          ### Note:
          If the direct APK doesn't work, use the chessking-web.zip with https://pwabuilder.com
        files: |
          chessking.apk
          chessking-web.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
